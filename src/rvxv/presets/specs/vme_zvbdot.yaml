- name: vqdotus.vv
  description: "4-element unsigned×signed dot product (UINT8×INT8→INT32)"
  encoding:
    format: vector
    opcode: 0x2b  # custom-1
    funct3: 0x0
    funct6: 0x3b  # bits[31:26], vm bit[25] is separate (was 0x39, changed to fix collision with vqdotsu.vv)
  operands:
    vs2: { type: vector, element: uint8, groups: 4 }
