# yaml-language-server: $schema=../src/rvxv/schema/instruction_spec.schema.json
#
# Example: INT8 4-way dot product with INT32 accumulation
# This is the most common custom AI instruction — used in quantized
# matrix multiplication for INT8 inference.
#
# Usage: rvxv generate --spec int8_dot_product.yaml --output ./build/

name: vdot4_i8i8_acc32
description: "4-way INT8 dot product with INT32 accumulation"
encoding:
  format: vector
  opcode: 0x5b    # custom-2
  funct3: 0x0
  funct6: 0x20    # bits[31:26], vm bit[25] is separate
operands:
  vs2: { type: vector, element: int8, groups: 4 }
  vs1: { type: vector, element: int8, groups: 4 }
  vd:  { type: vector, element: int32 }
semantics:
  operation: dot_product
  accumulate: true
  saturation: none
constraints:
  vl_dependent: true
  mask_agnostic: true
  tail_agnostic: true
