# yaml-language-server: $schema=../src/rvxv/schema/instruction_spec.schema.json
#
# Example: INT4 packed multiply-accumulate with INT32 accumulation
# Ultra-low precision for weight-only quantization (GPTQ/AWQ style).
# 8 INT4 elements packed per 32-bit word, dot product into INT32.
#
# Usage: rvxv generate --spec int4_packed_mac.yaml --output ./build/

name: vmac_i4i4_acc32
description: "INT4 packed multiply-accumulate with INT32 accumulation"
encoding:
  format: vector
  opcode: 0x5b
  funct3: 0x4
  funct6: 0x22  # bits[31:26], vm bit[25] is separate
operands:
  vs2: { type: vector, element: int4, groups: 8 }
  vs1: { type: vector, element: int4, groups: 8 }
  vd:  { type: vector, element: int32 }
semantics:
  operation: dot_product
  accumulate: true
  saturation: signed
constraints:
  vl_dependent: true
  mask_agnostic: true
  tail_agnostic: true
